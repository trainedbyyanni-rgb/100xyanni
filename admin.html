<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin</title>
  <link rel="stylesheet" href="assets/style.css" />
  <style>
    body { background:#fff; color:#111; font-family:'DM Sans',sans-serif; }

    /* ── LOGIN GATE ── */
    #login-gate {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 1rem;
    }

    #login-gate .gate-logo {
      font-family:'Bebas Neue',sans-serif;
      font-size:2rem;
      letter-spacing:.1em;
      color:#111;
      margin-bottom:.5rem;
    }

    #login-gate input {
      width:280px;
      padding:10px 14px;
      border:1px solid #e8e8e8;
      font-size:.9rem;
      font-family:'DM Sans',sans-serif;
      outline:none;
      text-align:center;
      letter-spacing:.1em;
    }

    #login-gate input:focus { border-color:#111; }

    #login-gate button {
      width:280px;
      padding:11px;
      background:#111;
      color:#fff;
      font-family:'Bebas Neue',sans-serif;
      font-size:.95rem;
      letter-spacing:.18em;
      border:none;
      cursor:pointer;
      transition:opacity .15s;
    }

    #login-gate button:hover { opacity:.8; }
    #login-gate .err { font-size:.75rem; color:#e00; display:none; }

    /* ── ADMIN PANEL ── */
    #admin-panel { display:none; max-width:860px; margin:0 auto; padding:3rem 2rem 5rem; }

    .admin-header {
      display:flex;
      align-items:center;
      justify-content:space-between;
      margin-bottom:2.5rem;
      padding-bottom:1.2rem;
      border-bottom:1px solid #e8e8e8;
    }

    .admin-header h1 { font-family:'Bebas Neue',sans-serif; font-size:1.6rem; letter-spacing:.08em; }

    .admin-header .logout-btn {
      font-size:.7rem;
      font-weight:600;
      letter-spacing:.1em;
      text-transform:uppercase;
      color:#999;
      cursor:pointer;
      background:none;
      border:none;
    }

    .admin-header .logout-btn:hover { color:#111; }

    /* ── TABS ── */
    .tabs { display:flex; gap:0; margin-bottom:2rem; border-bottom:1px solid #e8e8e8; }

    .tab-btn {
      font-family:'Bebas Neue',sans-serif;
      font-size:.9rem;
      letter-spacing:.12em;
      padding:10px 20px;
      border:none;
      background:none;
      color:#999;
      cursor:pointer;
      border-bottom:2px solid transparent;
      margin-bottom:-1px;
      transition:all .15s;
    }

    .tab-btn.active { color:#111; border-bottom-color:#111; }

    /* ── NEW POST FORM ── */
    .form-section { display:none; }
    .form-section.active { display:block; }

    .form-group { margin-bottom:1.2rem; }

    .form-group label {
      display:block;
      font-size:.65rem;
      font-weight:700;
      letter-spacing:.16em;
      text-transform:uppercase;
      color:#999;
      margin-bottom:.4rem;
    }

    .form-group input,
    .form-group textarea,
    .form-group select {
      width:100%;
      padding:10px 12px;
      border:1px solid #e8e8e8;
      font-size:.88rem;
      font-family:'DM Sans',sans-serif;
      color:#111;
      outline:none;
      transition:border-color .15s;
      background:#fff;
    }

    .form-group input:focus,
    .form-group textarea:focus { border-color:#111; }

    .form-group textarea { min-height:320px; resize:vertical; line-height:1.7; }

    .form-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:1rem; }

    .publish-btn {
      font-family:'Bebas Neue',sans-serif;
      font-size:.95rem;
      letter-spacing:.18em;
      background:#111;
      color:#fff;
      border:none;
      padding:12px 32px;
      cursor:pointer;
      transition:opacity .15s;
      margin-top:.5rem;
    }

    .publish-btn:hover { opacity:.8; }

    .success-msg {
      font-size:.78rem;
      color:#080;
      margin-top:.8rem;
      display:none;
    }

    /* ── POST LIST ── */
    #posts-section { display:none; }
    #posts-section.active { display:block; }

    .post-count {
      font-size:.7rem;
      font-weight:600;
      letter-spacing:.1em;
      text-transform:uppercase;
      color:#bbb;
      margin-bottom:1.2rem;
    }

    .admin-post-row {
      display:grid;
      grid-template-columns:1fr auto;
      align-items:start;
      gap:1.5rem;
      padding:1.2rem 0;
      border-bottom:1px solid #f0f0f0;
    }

    .admin-post-row:last-child { border-bottom:none; }

    .admin-post-title {
      font-family:'Bebas Neue',sans-serif;
      font-size:1.05rem;
      letter-spacing:.03em;
      color:#111;
      margin-bottom:3px;
    }

    .admin-post-meta { font-size:.7rem; color:#bbb; }

    .delete-btn {
      font-size:.65rem;
      font-weight:700;
      letter-spacing:.1em;
      text-transform:uppercase;
      color:#ccc;
      background:none;
      border:none;
      cursor:pointer;
      padding-top:4px;
      transition:color .15s;
      white-space:nowrap;
    }

    .delete-btn:hover { color:#e00; }

    .no-posts {
      font-size:.85rem;
      color:#ccc;
      padding:2rem 0;
      text-align:center;
    }

    /* content preview helper */
    .content-hint {
      font-size:.68rem;
      color:#bbb;
      margin-top:.3rem;
      line-height:1.5;
    }
  </style>
</head>
<body>

  <!-- LOGIN -->
  <div id="login-gate">
    <div class="gate-logo">100XYANNI</div>
    <input type="password" id="pw-input" placeholder="Enter access code" onkeydown="if(event.key==='Enter')tryLogin()" />
    <button onclick="tryLogin()">Enter</button>
    <span class="err" id="login-err">Incorrect code.</span>
  </div>

  <!-- ADMIN PANEL -->
  <div id="admin-panel">
    <div class="admin-header">
      <h1>Admin Dashboard</h1>
      <button class="logout-btn" onclick="logout()">Log Out</button>
    </div>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('new')">New Post</button>
      <button class="tab-btn" onclick="switchTab('posts')">All Posts</button>
    </div>

    <!-- NEW POST -->
    <div class="form-section active" id="new-post-section">
      <div class="form-row">
        <div class="form-group">
          <label>Date</label>
          <input type="text" id="post-date" placeholder="Jun 20, 2026" />
        </div>
        <div class="form-group">
          <label>Read Time</label>
          <input type="text" id="post-readtime" placeholder="10 min" />
        </div>
        <div class="form-group">
          <label>Tag</label>
          <input type="text" id="post-tag" placeholder="Peptide" />
        </div>
      </div>

      <div class="form-group">
        <label>Post Title</label>
        <input type="text" id="post-title" placeholder="BPC-157: The Repair Peptide..." />
      </div>

      <div class="form-group">
        <label>Excerpt (shown on blog index)</label>
        <input type="text" id="post-excerpt" placeholder="Short one-line summary of the post..." />
      </div>

      <div class="form-group">
        <label>YouTube Video Link (optional)</label>
        <input type="text" id="post-video" placeholder="https://youtu.be/..." />
      </div>

      <div class="form-group">
        <label>Post Content</label>
        <textarea id="post-content" placeholder="Write your full post here...&#10;&#10;Use blank lines between paragraphs.&#10;&#10;## Section Header&#10;Your content..."></textarea>
        <div class="content-hint">Use ## for section headers. Blank lines = new paragraphs. Keep it clean.</div>
      </div>

      <button class="publish-btn" onclick="publishPost()">Publish Post</button>
      <div class="success-msg" id="success-msg">Post published successfully.</div>
    </div>

    <!-- ALL POSTS -->
    <div id="posts-section">
      <div class="post-count" id="post-count"></div>
      <div id="posts-list"></div>
    </div>

  </div>

  <script>
    const PASS = 'yannilogin';
    const STORE_KEY = '100xyanni_posts';

    function tryLogin() {
      const val = document.getElementById('pw-input').value.trim();
      if (val === PASS) {
        sessionStorage.setItem('admin_auth', '1');
        document.getElementById('login-gate').style.display = 'none';
        document.getElementById('admin-panel').style.display = 'block';
        loadPosts();
      } else {
        document.getElementById('login-err').style.display = 'block';
      }
    }

    function logout() {
      sessionStorage.removeItem('admin_auth');
      location.reload();
    }

    // Auto-login if already authed in this session
    if (sessionStorage.getItem('admin_auth') === '1') {
      document.getElementById('login-gate').style.display = 'none';
      document.getElementById('admin-panel').style.display = 'block';
    }

    function switchTab(tab) {
      document.querySelectorAll('.tab-btn').forEach((b,i) => {
        b.classList.toggle('active', (i===0 && tab==='new') || (i===1 && tab==='posts'));
      });
      document.getElementById('new-post-section').classList.toggle('active', tab==='new');
      document.getElementById('posts-section').classList.toggle('active', tab==='posts');
      if (tab === 'posts') loadPosts();
    }

    function getPosts() {
      try { return JSON.parse(localStorage.getItem(STORE_KEY)) || []; }
      catch { return []; }
    }

    function savePosts(posts) {
      localStorage.setItem(STORE_KEY, JSON.stringify(posts));
    }

    function publishPost() {
      const title   = document.getElementById('post-title').value.trim();
      const date    = document.getElementById('post-date').value.trim();
      const excerpt = document.getElementById('post-excerpt').value.trim();
      const content = document.getElementById('post-content').value.trim();
      const readtime= document.getElementById('post-readtime').value.trim();
      const tag     = document.getElementById('post-tag').value.trim();
      const video   = document.getElementById('post-video').value.trim();

      if (!title || !content) {
        alert('Title and content are required.');
        return;
      }

      const posts = getPosts();
      const id = 'post_' + Date.now();

      posts.unshift({ id, title, date, excerpt, content, readtime, tag, video, created: Date.now() });
      savePosts(posts);

      // Clear form
      ['post-title','post-date','post-excerpt','post-content','post-readtime','post-tag','post-video']
        .forEach(id => document.getElementById(id).value = '');

      const msg = document.getElementById('success-msg');
      msg.style.display = 'block';
      setTimeout(() => msg.style.display = 'none', 3000);
    }

    function loadPosts() {
      const posts = getPosts();
      const list = document.getElementById('posts-list');
      const count = document.getElementById('post-count');

      count.textContent = posts.length + ' post' + (posts.length !== 1 ? 's' : '');

      if (!posts.length) {
        list.innerHTML = '<div class="no-posts">No posts yet. Create your first one.</div>';
        return;
      }

      list.innerHTML = posts.map(p => `
        <div class="admin-post-row">
          <div>
            <div class="admin-post-title">${p.title}</div>
            <div class="admin-post-meta">${p.date || 'No date'} &nbsp;·&nbsp; ${p.readtime || ''} &nbsp;·&nbsp; ${p.tag || ''}</div>
          </div>
          <button class="delete-btn" onclick="deletePost('${p.id}')">Delete</button>
        </div>
      `).join('');
    }

    function deletePost(id) {
      if (!confirm('Delete this post?')) return;
      const posts = getPosts().filter(p => p.id !== id);
      savePosts(posts);
      loadPosts();
    }

    // Set today's date as default
    const today = new Date();
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    document.getElementById('post-date').value = months[today.getMonth()] + ' ' + today.getDate() + ', ' + today.getFullYear();
  </script>

</body>
</html>
