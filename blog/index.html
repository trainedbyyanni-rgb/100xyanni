<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog — 100X Yanni</title>
  <link rel="stylesheet" href="../assets/style.css" />
  <style>
    a,a:link,a:visited{color:inherit;text-decoration:none}
    .social-strip{display:flex;justify-content:flex-end;gap:12px;padding:10px 2.5rem;border-bottom:1px solid #e8e8e8}
    .s-btn{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;letter-spacing:.06em;color:#999;background:none;border:none;cursor:pointer;font-family:"DM Sans",sans-serif;text-decoration:none;transition:color .15s}
    .s-btn:hover{color:#111}
    .s-btn svg{width:13px;height:13px}
    .nav-logo{font-family:"Bebas Neue",sans-serif!important;font-size:1.5rem;letter-spacing:.1em;color:#111!important;text-decoration:none!important}
    .nav-links a,.nav-links a:link,.nav-links a:visited{font-family:"Bebas Neue",sans-serif!important;font-size:.95rem;letter-spacing:.12em;text-transform:uppercase;color:#999!important;text-decoration:none!important;transition:color .15s}
    .nav-links a:hover,.nav-links a.active{color:#111!important}
    body{background:#fff;color:#111}

    .page-hero { padding:4rem 2.5rem 3rem; max-width:1100px; margin:0 auto; border-bottom:1px solid #e8e8e8; }
    .page-hero h1 { font-family:'Bebas Neue',sans-serif; font-size:clamp(2.5rem,6vw,4.5rem); letter-spacing:.04em; line-height:1; color:#111; margin-bottom:.6rem; }
    .page-hero p { font-size:.88rem; color:#999; max-width:460px; }

    .post-list { max-width:1100px; margin:0 auto; padding:2.5rem 2.5rem; }

    .post-row {
      display:grid;
      grid-template-columns:80px 1fr 64px;
      gap:1.2rem;
      align-items:start;
      padding:1.3rem 0;
      border-bottom:1px solid #f0f0f0;
      cursor:pointer;
      transition:opacity .15s;
      text-decoration:none;
      color:inherit;
    }

    .post-row:hover { opacity:.6; }
    .post-row:last-child { border-bottom:none; }
    .post-date { font-size:.7rem; color:#bbb; padding-top:3px; letter-spacing:.03em; }
    .post-title { font-family:'Bebas Neue',sans-serif; font-size:1.1rem; letter-spacing:.03em; color:#111; line-height:1.25; margin-bottom:4px; }
    .post-excerpt { font-size:.78rem; color:#aaa; line-height:1.55; }
    .post-tag { display:inline-block; font-size:.58rem; font-weight:700; letter-spacing:.1em; text-transform:uppercase; border:1px solid #e8e8e8; color:#bbb; padding:2px 7px; margin-bottom:6px; }
    .post-time { font-size:.65rem; color:#ccc; text-align:right; padding-top:3px; }

    .empty-state { padding:4rem 2.5rem; text-align:center; }
    .empty-state p { font-size:.88rem; color:#bbb; }

    @media (max-width:640px) {
      .post-row { grid-template-columns:60px 1fr; }
      .post-time { display:none; }
      .page-hero, .post-list { padding-left:1.2rem; padding-right:1.2rem; }
    }
  </style>
</head>
<body>

  <div class="social-strip">
    <a href="https://www.tiktok.com/@yannijereissati" target="_blank" rel="noopener" class="s-btn">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-2.88 2.5 2.89 2.89 0 01-2.89-2.89 2.89 2.89 0 012.89-2.89c.28 0 .54.04.79.1V9.01a6.32 6.32 0 00-.79-.05 6.34 6.34 0 00-6.34 6.34 6.34 6.34 0 006.34 6.34 6.34 6.34 0 006.33-6.34V8.75a8.16 8.16 0 004.77 1.52V6.82a4.85 4.85 0 01-1-.13z"/></svg>TikTok
    </a>
    <a href="https://www.instagram.com/100xyanni" target="_blank" rel="noopener" class="s-btn">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg>Instagram
    </a>

  </div>

  <nav>
    <a href="../index.html" class="nav-logo">100XYANNI</a>
    <ul class="nav-links">
      <li><a href="index.html" class="active">Blog</a></li>
      <li><a href="../videos.html">Videos</a></li>
      <li><a href="../cognitive/index.html">Cognitive</a></li>
      <li><a href="../sources.html">Sources</a></li>
    </ul>
  </nav>

  <div class="page-hero">
    <p class="section-label">All Posts</p>
    <h1>The Research,<br>Broken Down</h1>
    <p>Mechanism-first, citation-backed, written to go deeper than the video.</p>
  </div>

  <div class="post-list" id="post-list">
    <div class="empty-state"><p>Loading posts...</p></div>
  </div>

  <footer>
    <span class="footer-logo">100XYANNI</span>
    <span class="footer-note">All content is for educational and informational purposes only.</span>
  </footer>

  <script>
    const STORE_KEY = '100xyanni_posts';

    function getPosts() {
      try { return JSON.parse(localStorage.getItem(STORE_KEY)) || []; }
      catch { return []; }
    }

    function render() {
      const posts = getPosts();
      const list = document.getElementById('post-list');

      if (!posts.length) {
        list.innerHTML = '<div class="empty-state"><p>No posts yet.</p></div>';
        return;
      }

      list.innerHTML = posts.map(p => `
        <a href="post.html?id=${p.id}" class="post-row">
          <span class="post-date">${p.date || ''}</span>
          <div>
            ${p.tag ? `<span class="post-tag">${p.tag}</span>` : ''}
            <div class="post-title">${p.title}</div>
            <div class="post-excerpt">${p.excerpt || ''}</div>
          </div>
          <span class="post-time">${p.readtime || ''}</span>
        </a>
      `).join('');
    }

    render();
  </script>

</body>
</html>
